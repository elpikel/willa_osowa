server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # gzip for the big HTML files
    gzip              on;
    gzip_types        text/html text/css application/javascript image/svg+xml;
    gzip_min_length   1024;

    resolver 1.1.1.1 8.8.8.8 valid=300s;

    # --- Plausible proxy (first-party, so ad-blockers don't block it) ---
    # analytics script served from our own domain
    location = /js/script.js {
        proxy_pass https://plausible.przetargowyprzeglad.pl/js/script.hash.outbound-links.tagged-events.js;
        proxy_set_header Host plausible.przetargowyprzeglad.pl;
        proxy_ssl_server_name on;
        proxy_set_header Accept-Encoding "";
        add_header Cache-Control "public, max-age=21600, must-revalidate";
    }
    # event ingestion forwarded to the Plausible instance
    location = /api/event {
        proxy_pass https://plausible.przetargowyprzeglad.pl/api/event;
        proxy_set_header Host plausible.przetargowyprzeglad.pl;
        proxy_ssl_server_name on;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # HTML: always revalidate so a redeploy is picked up immediately
    # (browser keeps the copy but checks with the server via ETag → 304 when unchanged)
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    # static assets (images, fonts): cache hard for a month
    location ~* \.(webp|jpe?g|png|gif|svg|woff2?|css|js)$ {
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # everything else: SPA-style fallback to the landing page
    location / {
        try_files $uri $uri/ /index.html;
    }
}
